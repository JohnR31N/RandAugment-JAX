dataset: cifar10
data_dir: ./data
model: preact_resnet18
method: randaugment

batch_size: 128
epochs: 200
max_train_steps: -1
max_eval_steps: -1

validation_split: 0.1
eval_on_test_each_epoch: false
final_test: true

learning_rate: 0.1
momentum: 0.9
weight_decay: 0.0005
lr_schedule: cosine
min_learning_rate: 0.0
lr_decay_epochs: [100, 150]
lr_decay_rate: 0.1

basic_aug: true
randaug_num_ops: 2
randaug_magnitude: 9
randaug_num_magnitude_bins: 31
seed: 0

save_csv: true
output_dir: ./outputs
output_name: ""
run_name: cifar10_preact_resnet18_randaugment

save_checkpoint: true
checkpoint_dir: ./checkpoints
save_best_only: true
resume_checkpoint: ""

log_time: true
distributed: true
