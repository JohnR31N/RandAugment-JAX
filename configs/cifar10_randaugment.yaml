experiment_name: cifar10_randaugment

runtime:
  backend: jax

dataset:
  name: cifar10
  data_dir: ./data
  image_size: 32
  num_workers: 8
  download: true

augment:
  policy: randaugment
  random_crop_padding: 4
  horizontal_flip: true
  randaug_num_ops: 2
  randaug_magnitude: 9
  randaug_num_magnitude_bins: 31
  randaug_fill: mean

model:
  name: cifar_resnet
  depth: 20
  width: 16
  dropout_rate: 0.0

train:
  seed: 0
  global_batch_size: 1024
  epochs: 200
  learning_rate: 0.4
  warmup_epochs: 5
  weight_decay: 0.0005
  label_smoothing: 0.0
  mixed_precision: true
  log_every_steps: 50
  eval_every_epochs: 1
  checkpoint_every_epochs: 10
  ckpt_dir: ./checkpoints/cifar10_randaugment
